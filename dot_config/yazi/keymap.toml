[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "p" ]
run  = "plugin compress -p"
desc = "Archive selected files (password)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "h" ]
run  = "plugin compress -ph"
desc = "Archive selected files (password+header)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "l" ]
run  = "plugin compress -l"
desc = "Archive selected files (compression level)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "u" ]
run  = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"

[[mgr.prepend_keymap]]
on   = [ "g", "i" ]
run  = 'shell --block -- sh -c "cd \"$(git rev-parse --show-toplevel)\" && lazygit"'
desc = "Open lazygit at repo root"
for = "unix"

[[mgr.prepend_keymap]]
on   = [ "g", "i" ]
run  = 'shell --block pwsh -NoProfile -Command "cd (git rev-parse --show-toplevel); lazygit"'
desc = "Open lazygit at repo root"
for = "windows"


